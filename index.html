<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK 1-4 Vocabulary Trainer</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="img/HSKfavicon.png">
  <!-- CSS Style -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

<header>
  <h1>📚 HSK 1–4 Vocabulary Builder</h1>
  <div class="burger-group">
    <button id="burgerBtn" class="burger-btn" aria-label="Open language menu">🌐</button>
    <span class="burger-label" id="burgerLabel">Language</span>
  </div>
  <p class="subtitle">Study • Quiz • Track • Master</p>
  <div id="burgerLangMenu" class="burger-lang-menu hidden">
    <div class="burger-menu-title"><strong id="burgerMenuTitle">Choose language</strong></div>
    <button class="lang-option" data-lang="en">🇺🇸 English</button>
    <button class="lang-option" data-lang="ru">🇷🇺 Russian</button>
  </div>
</header>

<!-- Mode tabs -->
<div class="mode-tabs">
  <button class="tab-btn active" id="tabStudy">📖 Study</button>
  <button class="tab-btn" id="tabQuiz">🧠 Quiz</button>
</div>

<!-- Controls -->
<div id="studyControls">
  <div class="controls">
    <select id="levelFilter">
      <option value="all">All Levels (1–4)</option>
      <option value="1">HSK 1</option>
      <option value="2">HSK 2</option>
      <option value="3">HSK 3</option>
      <option value="4">HSK 4</option>
    </select>
    <select id="typeFilter">
      <option value="all">All Word Types</option>
    </select>
    <input type="text" id="search" placeholder="🔍 Search Chinese, Pinyin or English…">
  </div>
  <div class="controls controls-actions">
    <button class="btn btn-outline" id="shuffleBtn">🔀 Shuffle</button>
    <button class="btn btn-outline" id="unknownBtn">👁 Unknown Only</button>
    <button class="btn btn-outline btn-export" id="exportBtn">⬇ Export CSV</button>
  </div>
</div>

<div class="controls" id="quizControls" style="display:none">
  <select id="quizLevelFilter">
    <option value="all">All Levels (1–4)</option>
    <option value="1">HSK 1</option>
    <option value="2">HSK 2</option>
    <option value="3">HSK 3</option>
    <option value="4">HSK 4</option>
  </select>
  <select id="quizTypeFilter">
    <option value="all">All Word Types</option>
  </select>
  <button class="btn" id="startQuizBtn">▶ Start Quiz</button>
</div>

<!-- Progress bar (study mode) -->
<div class="stats" id="statsBar">
  <div class="stats-row">
    <span><strong id="progressCount">0</strong> <span id="masteredLabel">mastered</span></span>
    <span><span id="ofLabel">of</span> <strong id="totalCount">0</strong> <span id="wordsLabel">words</span></span>
    <button class="btn btn-danger" id="resetBtn" style="padding:6px 16px;font-size:0.85rem;">↺ Reset</button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<!-- Study mode card grid -->
<div id="wordContainer" class="word-grid"></div>

<!-- Quiz mode container -->
<div id="quizContainer" style="display:none"></div>
